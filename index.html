<!DOCTYPE html>
<html>
<head>
    <title>Sorry 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>I am really sorry 🥺💖</h1>

    <div class="buttons">
        <a href="success.html">
            <button class="yes">Chalo maff kiya ❤️</button>
        </a>

        <button class="no" onclick="moveButton()">Ny 😏</button>
    </div>
</div>

<script>
function moveButton() {
    let btn = document.querySelector('.no');
    let x = Math.random() * 300;
    let y = Math.random() * 300;

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}
</script>

</body>
